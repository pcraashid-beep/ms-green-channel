<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | MSGCPPL Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .task-card { transition: 0.2s; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark shadow-sm mb-4" style="background-color: #2980b9;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="admin-staff.html">⬅ Back to HR Hub</a>
            <span class="navbar-text text-white fw-bold d-none d-md-block">Site Task Assignment</span>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 border-top border-info border-4">
                    <div class="card-header bg-white fw-bold py-3">Assign New Task</div>
                    <div class="card-body">
                        <form id="task-form">
                            <label class="small fw-bold text-muted mb-1">Select Staff Member</label>
                            <select id="ts" class="form-select mb-3 bg-light" required>
                                <option value="" disabled selected>Loading staff...</option>
                            </select>
                            
                            <label class="small fw-bold text-muted mb-1">Project Site Name</label>
                            <input type="text" id="tp" class="form-control mb-3 bg-light" placeholder="Ex: Site A - Thathri" required>
                            
                            <label class="small fw-bold text-muted mb-1">Task Description</label>
                            <textarea id="td" class="form-control mb-4 bg-light" rows="4" placeholder="Describe the task details..." required></textarea>
                            
                            <button type="submit" class="btn btn-info text-white w-100 fw-bold py-2 shadow-sm">Assign Task</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                    <h4 class="fw-bold mb-0 text-dark">Active Work Logs</h4>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadLogs()">🔄 Refresh</button>
                </div>
                <div id="log-list" class="mb-5">
                    <div class="text-center text-muted py-3">Loading tasks...</div>
                </div>
            </div>
        </div>
    </div>

<script>
    const SERVER_URL = "https://msgcppl-backend.onrender.com";
    const token = localStorage.getItem('token');
    
    if (localStorage.getItem('role') !== 'admin') window.location.href = "login.html";

    async function loadData() {
        loadStaffDropdown();
        loadLogs();
    }

    async function loadStaffDropdown() {
        try {
            const res = await fetch(`${SERVER_URL}/api/users`, { headers: { 'Authorization': `Bearer ${token}` } });
            const users = await res.json();
            const select = document.getElementById('ts');
            select.innerHTML = '<option value="" disabled selected>-- Choose a Staff Member --</option>';
            
            // Only show staff members, not admins
            users.filter(u => u.role !== 'admin').forEach(user => {
                select.innerHTML += `<option value="${user.username}">${user.fullName} (@${user.username})</option>`;
            });
        } catch (e) {
            document.getElementById('ts').innerHTML = '<option value="" disabled>Error loading staff</option>';
        }
    }

    async function loadLogs() {
        try {
            const res = await fetch(`${SERVER_URL}/api/worklogs`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            const container = document.getElementById('log-list');
            
            container.innerHTML = data.length ? '' : '<div class="alert alert-light text-center border">No active tasks found.</div>';
            
            data.forEach(log => {
                const div = document.createElement('div');
                div.className = "card mb-2 p-3 border-0 shadow-sm task-card";
                div.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="badge bg-secondary mb-1">${log.projectName}</span>
                            <h6 class="mb-1 fw-bold text-primary">@${log.staffName}</h6>
                            <p class="mb-1 text-dark">${log.task}</p>
                            <small class="text-muted">${new Date(log.date).toLocaleDateString()}</small>
                        </div>
                        <div class="text-end">
                            <span class="badge ${log.status === 'Completed' ? 'bg-success' : 'bg-warning text-dark'} d-block mb-2">${log.status}</span>
                            <button class="btn btn-sm btn-outline-danger border-0" onclick="deleteLog('${log._id}')">🗑️ Delete</button>
                        </div>
                    </div>`;
                container.appendChild(div);
            });
        } catch (e) {
            document.getElementById('log-list').innerHTML = '<div class="text-danger w-100 text-center">Failed to load logs.</div>';
        }
    }

    document.getElementById('task-form').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch(`${SERVER_URL}/api/worklogs`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ 
                staffName: document.getElementById('ts').value, 
                projectName: document.getElementById('tp').value, 
                task: document.getElementById('td').value 
            })
        });
        
        if(res.ok) { 
            document.getElementById('tp').value = document.getElementById('td').value = ''; 
            loadLogs(); 
        }
    };

    async function deleteLog(id) {
        if(confirm("Remove this work log completely?")) {
            await fetch(`${SERVER_URL}/api/worklogs/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            loadLogs();
        }
    }

    window.onload = loadData;
</script>
</body>
</html>

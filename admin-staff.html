<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Hub | MSGCPPL Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .dashboard-btn { 
            height: 140px; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.2rem; 
            font-weight: bold; 
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            text-decoration: none;
        }
        .dashboard-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.15); color: white; }
        .btn-icon { font-size: 2.5rem; margin-bottom: 10px; }
        
        /* Custom Button Colors */
        .btn-register { background: linear-gradient(45deg, #2c3e50, #34495e); color: white; }
        .btn-tasks { background: linear-gradient(45deg, #2980b9, #3498db); color: white; }
        .btn-approvals { background: linear-gradient(45deg, #d35400, #e67e22); color: white; }
        .btn-tour { background: linear-gradient(45deg, #16a085, #1abc9c); color: white; }
        .btn-expense { background: linear-gradient(45deg, #8e44ad, #9b59b6); color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="management-dashboard.html">⬅ Main Dashboard</a>
            <span class="navbar-text text-white fw-bold d-none d-md-block">Human Resources Control</span>
        </div>
    </nav>

    <div class="container py-4">
        <div class="text-center mb-5">
            <h3 class="fw-bold text-dark mb-1">Staff Management Hub</h3>
            <p class="text-muted small">Select an HR module to manage</p>
        </div>

        <div class="row g-4 justify-content-center max-w-75 mx-auto">
            
            <div class="col-md-6 col-lg-4">
                <a href="admin-register.html" class="dashboard-btn btn-register">
                    <span class="btn-icon">👤</span> Register New Account
                </a>
            </div>
            
            <div class="col-md-6 col-lg-4">
                <a href="admin-tasks.html" class="dashboard-btn btn-tasks">
                    <span class="btn-icon">📋</span> Assign Site Task
                </a>
            </div>

            <div class="col-md-6 col-lg-4">
                <a href="special-approvals.html" class="dashboard-btn btn-approvals">
                    <span class="btn-icon">✅</span> Special Approvals
                </a>
            </div>

            <div class="col-md-6 col-lg-4">
                <a href="admin-tourdiary.html" class="dashboard-btn btn-tour">
                    <span class="btn-icon">✈️</span> Tour Diaries
                </a>
            </div>

            <div class="col-md-6 col-lg-4">
                <a href="admin-expensediary.html" class="dashboard-btn btn-expense">
                    <span class="btn-icon">💰</span> Expense Diaries
                </a>
            </div>

        </div>
    </div>

    <script>
        // Security Check
        if (localStorage.getItem('role') !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>

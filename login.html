<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MS Green Channel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h2>Corporate Portal</h2>
        <div class="login-tabs">
            <div class="login-card">
                <h3>General Employee</h3>
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
                <button class="btn">Login</button>
            </div>
            
            <div class="login-card special">
                <h3>Project Management</h3>
                <p>Authorized Personnel Only</p>
                <input type="text" placeholder="Admin ID">
                <input type="password" placeholder="Access Key">
                <button class="btn btn-alt">Access Dashboard</button>
            </div>
        </div>
        <a href="index.html" class="back-link">← Return to Home</a>
    </div>
</body>
</html>

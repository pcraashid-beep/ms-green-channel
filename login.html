<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MS Green Channel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <a href="index.html" class="text-white text-decoration-none mb-3 d-block">⬅ Back to Main Website</a>
                <div class="card login-card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">MSGCPPL</h3>
                        <p class="text-muted">Enterprise Resource Planning</p>
                    </div>
                    <form id="login-form">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Username</label>
                            <input type="text" id="username" class="form-control" required placeholder="Enter username">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" id="password" class="form-control" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Sign In</button>
                    </form>
                    <div id="msg" class="mt-3 text-center small text-danger"></div>
                    <hr>
                    <button type="button" class="btn btn-danger w-100 mt-2 fw-bold" onclick="forceRegisterAdmin()">
                        CREATE MASTER ADMIN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://msgcppl-backend.onrender.com";

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            msg.innerText = "Checking credentials...";

            try {
                const res = await fetch(`${SERVER_URL}/api/login`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('fullName', data.fullName);
                    localStorage.setItem('username', data.username);
                    
                    if (String(data.role).toLowerCase() === 'admin') {
                        window.location.href = "management-dashboard.html";
                    } else {
                        window.location.href = "employee-portal.html";
                    }
                } else { msg.innerText = data.error || "Invalid Credentials"; }
            } catch (err) { msg.innerText = "Server error."; }
        };

        async function forceRegisterAdmin() {
            if(!confirm("Create admin account?")) return;
            try {
                const res = await fetch(`${SERVER_URL}/api/register-staff`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        fullName: "Main Admin", 
                        username: "admin_boss", 
                        password: "AdminPassword123",
                        role: "admin"
                    })
                });
                const data = await res.json();
                alert("Success! Now login with admin_boss / AdminPassword123");
            } catch (err) { alert("Connection Error"); }
        }
    </script>
</body>
</html>

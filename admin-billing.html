<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Billing | MSGCPPL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4"><div class="container"><a class="navbar-brand fw-bold" href="management-dashboard.html">⬅ Dashboard</a></div></nav>
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 border-0 shadow-sm">
                    <h6 class="fw-bold">Raise New Bill</h6>
                    <select id="billProj" class="form-select mb-2" onchange="refreshBills()"></select>
                    <input type="text" id="billNum" class="form-control mb-2" placeholder="Bill No. (e.g. INV-001)">
                    <input type="number" id="billAmt" class="form-control mb-2" placeholder="Amount">
                    <input type="date" id="billDue" class="form-control mb-3">
                    <button class="btn btn-success w-100 fw-bold" onclick="raiseBill()">Generate Bill Entry</button>
                </div>
            </div>
            <div class="col-md-8">
                <div id="bill-list"></div>
            </div>
        </div>
    </div>
<script>
        // 1. Added the live cloud server link
        const SERVER_URL = "https://msgcppl-backend.onrender.com";

        const token = localStorage.getItem('token');
        
        async function load() {
            // Updated fetch to use SERVER_URL
            const pRes = await fetch(`${SERVER_URL}/api/projects`, { headers: {'Authorization': `Bearer ${token}`} });
            const projects = await pRes.json();
            billProj.innerHTML = projects.map(p => `<option value="${p._id}">${p.name}</option>`).join('');
            refreshBills();
        }
        
        async function raiseBill() {
            // Updated fetch to use SERVER_URL
            await fetch(`${SERVER_URL}/api/billing`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({ projectId: billProj.value, billNumber: billNum.value, amount: billAmt.value, dueDate: billDue.value })
            });
            billNum.value = billAmt.value = billDue.value = '';
            refreshBills();
        }
        
        async function refreshBills() {
            // Updated fetch to use SERVER_URL
            const res = await fetch(`${SERVER_URL}/api/billing/${billProj.value}`, { headers: {'Authorization': `Bearer ${token}`} });
            const bills = await res.json();
            document.getElementById('bill-list').innerHTML = bills.map(b => `
                <div class="card mb-2 p-3 border-0 shadow-sm d-flex flex-row justify-content-between align-items-center">
                    <div><b>${b.billNumber}</b> - ₹${b.amount.toLocaleString()}<br><small class="text-muted">Due: ${new Date(b.dueDate).toLocaleDateString()}</small></div>
                    <div>
                        <span class="badge ${b.status==='Paid'?'bg-success':'bg-warning'} me-2">${b.status}</span>
                        <button class="btn btn-sm btn-outline-danger py-0" onclick="delBill('${b._id}')">🗑 Delete</button>
                    </div>
                </div>`).join('');
        }
        
        async function delBill(id) {
            if(confirm("Delete this bill record permanently?")) {
                // Updated fetch to use SERVER_URL
                await fetch(`${SERVER_URL}/api/billing/${id}`, { method: 'DELETE', headers: {'Authorization': `Bearer ${token}`} });
                refreshBills();
            }
        }
        
        window.onload = load;
    </script>
</body>
</html>

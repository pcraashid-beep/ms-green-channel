<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Approvals | MSGCPPL Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .card { transition: 0.2s; border-radius: 12px; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1) !important; }
        .border-pending { border-top: 4px solid #ffc107 !important; }
        .border-approved { border-top: 4px solid #198754 !important; }
        .border-rejected { border-top: 4px solid #dc3545 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="management-dashboard.html">⬅ Back to Dashboard</a>
            <span class="navbar-text text-white fw-bold d-none d-md-block">Special Approvals Control</span>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
            <h4 class="fw-bold mb-0 text-dark">Staff Requests</h4>
            <button class="btn btn-sm btn-outline-secondary" onclick="loadApprovals()">🔄 Refresh</button>
        </div>

        <div class="row g-4" id="approvals-list">
            <div class="text-center text-muted py-5 w-100">Loading requests...</div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://msgcppl-backend.onrender.com";
        const token = localStorage.getItem('token');
        
        // Security Check: Only Admins allowed
        if (localStorage.getItem('role') !== 'admin') {
            window.location.href = 'login.html';
        }

        async function loadApprovals() {
            try {
                const res = await fetch(`${SERVER_URL}/api/approvals/admin`, { 
                    headers: {'Authorization': `Bearer ${token}`} 
                });
                const data = await res.json();
                const list = document.getElementById('approvals-list');
                
                if(data.length === 0) {
                    list.innerHTML = '<div class="col-12 text-center text-muted py-4">No approval requests found.</div>';
                    return;
                }

                list.innerHTML = data.map(req => {
                    // Define styles based on status
                    let borderClass = 'border-pending';
                    let statusBadge = '<span class="badge bg-warning text-dark">Pending</span>';
                    let actionButtons = `
                        <div class="d-flex gap-2 mt-3">
                            <button class="btn btn-success flex-fill fw-bold py-2" onclick="updateStatus('${req._id}', 'Approved')">Approve</button>
                            <button class="btn btn-danger flex-fill fw-bold py-2" onclick="updateStatus('${req._id}', 'Rejected')">Reject</button>
                        </div>
                    `;

                    if (req.status === 'Approved') {
                        borderClass = 'border-approved';
                        statusBadge = '<span class="badge bg-success">Approved</span>';
                        actionButtons = `<div class="mt-3 text-center p-2 bg-light rounded text-success fw-bold">✔ Request Approved</div>`;
                    } else if (req.status === 'Rejected') {
                        borderClass = 'border-rejected';
                        statusBadge = '<span class="badge bg-danger">Rejected</span>';
                        actionButtons = `<div class="mt-3 text-center p-2 bg-light rounded text-danger fw-bold">✖ Request Rejected</div>`;
                    }

                    // Define Attachment Button
                    const fileBtn = req.fileUrl 
                        ? `<a href="${SERVER_URL}${req.fileUrl}" target="_blank" class="btn btn-sm btn-outline-primary mt-3 w-100">📎 View Attached Document</a>` 
                        : '';

                    return `
                        <div class="col-md-6 col-lg-4">
                            <div class="card shadow-sm border-0 h-100 ${borderClass}">
                                <div class="card-body d-flex flex-column p-4">
                                    <div class="d-flex justify-content-between align-items-start mb-3">
                                        <div>
                                            <h6 class="fw-bold text-primary mb-0">@${req.staffName}</h6>
                                            <small class="text-muted">${new Date(req.date).toLocaleString()}</small>
                                        </div>
                                        ${statusBadge}
                                    </div>
                                    
                                    <p class="text-dark flex-grow-1 mb-0" style="white-space: pre-wrap;">${req.description}</p>
                                    
                                    ${fileBtn}
                                    ${actionButtons}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(e) {
                document.getElementById('approvals-list').innerHTML = '<div class="col-12 text-danger text-center">Failed to load data.</div>';
            }
        }

        async function updateStatus(id, status) {
            if(!confirm(`Are you sure you want to mark this as ${status}?`)) return;
            
            try {
                await fetch(`${SERVER_URL}/api/approvals/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ status })
                });
                loadApprovals(); // Reload to show updated UI
            } catch(e) {
                alert("Error updating status.");
            }
        }

        window.onload = loadApprovals;
    </script>
</body>
</html>

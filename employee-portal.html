<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Hub | MS Green Channel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .top-navbar { background: #2e7d32; }
        .dashboard-btn { 
            height: 140px; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.2rem; 
            font-weight: bold; 
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
        }
        .dashboard-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.15); }
        .btn-icon { font-size: 2.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark top-navbar shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <img src="logo.png" alt="Logo" height="30" class="me-2">
                MSGCPPL Staff
            </a>
            <button class="btn btn-outline-light btn-sm fw-bold" onclick="localStorage.clear(); window.location.href='login.html'">🚪 Logout</button>
        </div>
    </nav>

    <div class="container py-4">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark mb-1">Welcome, <span id="user-display" class="text-success">...</span></h3>
            <p class="text-muted small">Select a module to begin</p>
        </div>

        <div class="row g-3 justify-content-center max-w-75 mx-auto">
            <div class="col-6 col-md-4">
                <button class="btn btn-primary w-100 dashboard-btn" onclick="window.location.href='staff-tasks.html'">
                    <span class="btn-icon">📋</span> Assigned Tasks
                </button>
            </div>
            
            <div class="col-6 col-md-4">
                <button class="btn btn-success w-100 dashboard-btn" onclick="window.location.href='staff-attendance.html'">
                    <span class="btn-icon">📅</span> Attendance
                </button>
            </div>

            <div class="col-6 col-md-4">
                <button class="btn btn-warning text-dark w-100 dashboard-btn" onclick="window.location.href='staff-approval.html'">
                    <span class="btn-icon">✅</span> Special Approval
                </button>
            </div>

            <div class="col-6 col-md-4">
                <button class="btn btn-info text-dark w-100 dashboard-btn" onclick="window.location.href='tourdiary.html'">
                    <span class="btn-icon">✈️</span> Tour Diary
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button class="btn btn-secondary w-100 dashboard-btn" onclick="window.location.href='staff-expense.html'">
                    <span class="btn-icon">💰</span> Expense Diary
                </button>
            </div>
        </div>
    </div>

<script>
        const token = localStorage.getItem('token');
        const fullName = localStorage.getItem('fullName');

        if (!token) window.location.href = "login.html";
        document.getElementById('user-display').innerText = fullName;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal | MS Green Channel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --msg-green: #2e7d32; }
        .sidebar { min-height: 100vh; background: var(--msg-green); color: white; padding: 20px; }
        .nav-link { color: white; opacity: 0.8; margin-bottom: 10px; transition: 0.2s; }
        .nav-link:hover { opacity: 1; padding-left: 5px; }
        .dashboard-btn { 
            height: 120px; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.2rem; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .dashboard-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar">
                <div class="text-center mb-3">
                    <img src="logo.png" alt="MSGCPPL" style="max-width: 80px; margin-bottom: 10px;">
                    <h4 class="text-white">MSGCPPL</h4>
                </div>
                <div class="nav flex-column mt-4">
                    <a class="nav-link fw-bold" style="opacity: 1;" href="employee-portal.html">🏠 Home Hub</a>
                    <a class="nav-link" href="staff-tasks.html">📋 Assigned Tasks</a>
                    <a class="nav-link" href="staff-attendance.html">📅 Attendance</a>
                    <a class="nav-link" href="staff-approval.html">✅ Special Approval</a>
                    <a class="nav-link" href="tourdiary.html">✈️ Tour Diary</a>
                    <a class="nav-link" href="staff-expense.html">💰 Expense Diary</a>
                    <a class="nav-link text-warning mt-5 fw-bold" href="#" onclick="localStorage.clear(); window.location.href='login.html'">🚪 Logout</a>
                </div>
            </nav>

            <main class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
                    <h3 class="fw-bold mb-0 text-dark">Staff Portal</h3>
                    <span class="badge bg-success p-2 fs-6">Logged in as: <span id="user-display">...</span></span>
                </div>

                <div class="row g-4">
                    <div class="col-md-4 col-sm-6">
                        <button class="btn btn-primary w-100 dashboard-btn" onclick="window.location.href='staff-tasks.html'">
                            <span class="fs-1 mb-2">📋</span> Assigned Tasks
                        </button>
                    </div>
                    
                    <div class="col-md-4 col-sm-6">
                        <button class="btn btn-success w-100 dashboard-btn" onclick="window.location.href='staff-attendance.html'">
                            <span class="fs-1 mb-2">📅</span> Attendance
                        </button>
                    </div>

                    <div class="col-md-4 col-sm-6">
                        <button class="btn btn-warning text-dark w-100 dashboard-btn" onclick="window.location.href='staff-approval.html'">
                            <span class="fs-1 mb-2">✅</span> Special Approval
                        </button>
                    </div>

                    <div class="col-md-6 col-sm-6">
                        <button class="btn btn-info text-dark w-100 dashboard-btn" onclick="window.location.href='tourdiary.html'">
                            <span class="fs-1 mb-2">✈️</span> Tour Diary
                        </button>
                    </div>

                    <div class="col-md-6 col-sm-12">
                        <button class="btn btn-secondary w-100 dashboard-btn" onclick="window.location.href='staff-expense.html'">
                            <span class="fs-1 mb-2">💰</span> Expense Diary
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

<script>
        const token = localStorage.getItem('token');
        const fullName = localStorage.getItem('fullName');

        if (!token) window.location.href = "login.html";
        document.getElementById('user-display').innerText = fullName;
    </script>
</body>
</html>

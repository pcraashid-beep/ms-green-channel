<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ongoing Projects | MS Green Channel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Adjusted padding to account for the fixed nav bar from style.css */
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1466611653911-95282fc3656b?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; 
            background-position: center; 
            color: white; 
            padding: 140px 0 80px; /* Pushed down so header doesn't hide text */
        }
        .project-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .project-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important; }
    </style>
</head>
<body class="bg-light">

    <header>
        <nav>
            <div class="logo d-flex align-items-center">
    <img src="logo.png" alt="MSGCPPL Logo" style="height: 40px; margin-right: 10px;">
    MS Green Channel
</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Company Login</a></li>
                <li><a href="projects.html" class="active">Ongoing Projects</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Infrastructure Developments</h1>
            <p class="lead">Tracking our progress toward a sustainable future.</p>
        </div>
    </header>

    <main class="container py-5">
        <div class="row g-4" id="public-project-list">
            <div class="text-center w-100 py-5">
                <div class="spinner-border text-success" role="status"><span class="visually-hidden">Loading...</span></div>
                <p class="mt-2 text-muted">Accessing Database...</p>
            </div>
        </div>
    </main>

<script>
        // 1. Added the live cloud server link
        const SERVER_URL = "https://msgcppl-backend.onrender.com";

        async function loadPublicProjects() {
            try {
                // 2. Updated fetch to use SERVER_URL
                const response = await fetch(`${SERVER_URL}/api/public/projects`); 
                const projects = await response.json();
                const container = document.getElementById('public-project-list');
                container.innerHTML = ''; 

                if (projects.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center text-muted"><h3>No active projects at this time.</h3></div>';
                    return;
                }

                projects.forEach(p => {
                    const cardCol = document.createElement('div');
                    cardCol.className = 'col-md-6 col-lg-4';
                    cardCol.innerHTML = `
                        <div class="card h-100 shadow-sm border-0 project-card">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <h5 class="card-title fw-bold mb-0">${p.name}</h5>
                                    <span class="badge bg-success-subtle text-success border border-success-subtle">Live</span>
                                </div>
                                <p class="text-muted small mb-3">
                                    Location: <strong>${p.location || 'Multiple Sites'}</strong><br>
                                    Budget: <strong>₹${p.totalBudget.toLocaleString()}</strong>
                                </p>
                                <hr>
                                <div class="mb-1 d-flex justify-content-between small">
                                    <span>Completion Progress</span><span class="fw-bold">${p.progress}%</span>
                                </div>
                                <div class="progress" style="height: 10px;">
                                    <div class="progress-bar bg-success progress-bar-striped" style="width: ${p.progress}%"></div>
                                </div>
                            </div>
                        </div>`;
                    container.appendChild(cardCol);
                });
            } catch (err) {
                document.getElementById('public-project-list').innerHTML = '<div class="alert alert-danger w-100">Unable to connect.</div>';
            }
        }
        window.onload = loadPublicProjects;
    </script>
</body>
</html>

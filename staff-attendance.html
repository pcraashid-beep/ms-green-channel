<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Attendance | MS Green Channel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --msg-green: #2e7d32; }
        .sidebar { min-height: 100vh; background: var(--msg-green); color: white; padding: 20px; }
        .nav-link { color: white; opacity: 0.8; margin-bottom: 10px; transition: 0.2s; }
        .nav-link:hover { opacity: 1; padding-left: 5px; }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar shadow">
                <div class="text-center mb-4 border-bottom border-success pb-3">
                    <img src="logo.png" alt="MSGCPPL" style="max-width: 70px; margin-bottom: 10px;">
                    <h5 class="text-white fw-bold mb-0">MSGCPPL</h5>
                </div>
                <div class="nav flex-column">
                    <a class="nav-link" href="employee-portal.html">🏠 Home Hub</a>
                    <a class="nav-link" href="staff-tasks.html">📋 Assigned Tasks</a>
                    <a class="nav-link fw-bold" style="opacity: 1;" href="staff-attendance.html">📅 Attendance</a>
                    <a class="nav-link" href="staff-approval.html">✅ Special Approval</a>
                    <a class="nav-link" href="tourdiary.html">✈️ Tour Diary</a>
                    <a class="nav-link" href="staff-expense.html">💰 Expense Diary</a>
                    <a class="nav-link text-warning mt-5 fw-bold" href="#" onclick="localStorage.clear(); window.location.href='login.html'">🚪 Logout</a>
                </div>
            </nav>

            <main class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                    <h3 class="fw-bold mb-0 text-success">Daily Attendance</h3>
                    <span class="badge bg-success p-2 fs-6 shadow-sm">User: <span id="user-display">...</span></span>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6">
                        <div class="card shadow-sm border-0 p-4 text-center mb-4">
                            <h4 class="fw-bold mb-3">Site Attendance Tracker</h4>
                            
                            <label class="form-label fw-bold text-muted">1. Take Live Photo</label>
                            <input type="file" id="camInput" accept="image/*" capture="environment" class="form-control mb-3 bg-light" required>
                            
                            <div id="statusText" class="small text-danger mb-3 fw-bold">Checking status...</div>

                            <div class="d-flex gap-2">
                                <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm" id="btnIn" onclick="markAttendance('In')">☀️ Clock IN</button>
                                <button class="btn btn-dark w-100 py-3 fw-bold shadow-sm" id="btnOut" onclick="markAttendance('Out')">🌙 Clock OUT</button>
                            </div>
                        </div>

                        <h6 class="fw-bold text-muted border-bottom pb-2">My History (Last 30 Days)</h6>
                        <div id="history-list"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

<script>
        const SERVER_URL = "https://msgcppl-backend.onrender.com";

        const token = localStorage.getItem('token');
        const fullName = localStorage.getItem('fullName');
        
        // Security & UI check
        if (!token) window.location.href = "login.html";
        document.getElementById('user-display').innerText = fullName;
        
        async function loadHistory() {
            const res = await fetch(`${SERVER_URL}/api/attendance/my-history`, { headers: {'Authorization': `Bearer ${token}`} });
            const data = await res.json();
            const list = document.getElementById('history-list');
            
            list.innerHTML = data.length ? data.map(r => `
                <div class="card mb-2 p-3 border-0 shadow-sm">
                    <div class="d-flex justify-content-between border-bottom pb-1 mb-2">
                        <strong class="text-dark">${r.dateString}</strong>
                    </div>
                    <div class="d-flex justify-content-between small">
                        <span><span class="fw-bold text-primary">IN:</span> ${r.clockInTime ? new Date(r.clockInTime).toLocaleTimeString() : '--'} (<span class="text-${r.clockInStatus==='Approved'?'success':'warning'} fw-bold">${r.clockInStatus}</span>)</span>
                        <span><span class="fw-bold text-dark">OUT:</span> ${r.clockOutTime ? new Date(r.clockOutTime).toLocaleTimeString() : '--'} (<span class="text-${r.clockOutStatus==='Approved'?'success':'warning'} fw-bold">${r.clockOutStatus || 'N/A'}</span>)</span>
                    </div>
                </div>
            `).join('') : '<p class="text-muted text-center py-2">No attendance records found.</p>';

            // Logic to disable buttons based on today's status
            const today = new Date().toISOString().split('T')[0];
            const todayRecord = data.find(d => d.dateString === today);
            
            document.getElementById('btnIn').disabled = false;
            document.getElementById('btnOut').disabled = false;
            document.getElementById('statusText').innerText = "Ready to capture.";
            document.getElementById('statusText').className = "small text-success mb-3 fw-bold";

            if (todayRecord) {
                document.getElementById('btnIn').disabled = true;
                if (todayRecord.clockOutTime) {
                    document.getElementById('btnOut').disabled = true;
                    document.getElementById('statusText').innerText = "Shift completed for today.";
                    document.getElementById('statusText').className = "small text-muted mb-3 fw-bold";
                } else {
                    document.getElementById('statusText').innerText = "Clocked In. Ready for Clock Out.";
                    document.getElementById('statusText').className = "small text-primary mb-3 fw-bold";
                }
            }
        }

        async function markAttendance(type) {
            const file = document.getElementById('camInput').files[0];
            if (!file) return alert("Please take a photo first!");

            const statusText = document.getElementById('statusText');
            statusText.innerText = "Locating GPS and uploading...";
            statusText.className = "small text-warning mb-3 fw-bold";

            // Get GPS Location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const coords = `${position.coords.latitude},${position.coords.longitude}`;
                    
                    // Upload Photo
                    const fd = new FormData(); fd.append('photo', file);
                    const upRes = await fetch(`${SERVER_URL}/api/upload-photo`, { method: 'POST', headers: {'Authorization': `Bearer ${token}`}, body: fd });
                    const photoUrl = (await upRes.json()).url;

                    // Send to Database
                    const res = await fetch(`${SERVER_URL}/api/attendance/mark`, {
                        method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                        body: JSON.stringify({ photoUrl, coords, type })
                    });
                    
                    if(res.ok) { 
                        alert(`Successfully Clocked ${type}!`); 
                        document.getElementById('camInput').value = ''; 
                        loadHistory(); 
                    }
                    else alert((await res.json()).error);
                    
                }, (error) => {
                    alert("GPS Access Denied! Please allow location permissions to mark attendance.");
                    statusText.innerText = "Location Error.";
                    statusText.className = "small text-danger mb-3 fw-bold";
                }, { enableHighAccuracy: true });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        window.onload = loadHistory;
    </script>
</body>
</html>

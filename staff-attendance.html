<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Attendance | MS Green Channel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="employee-portal.html">⬅ Portal</a></div>
    </nav>
    <div class="container">
        <div class="card shadow border-0 p-4 text-center mb-4">
            <h4 class="fw-bold mb-3">Site Attendance Tracker</h4>
            
            <label class="form-label fw-bold text-muted">1. Take Live Photo</label>
            <input type="file" id="camInput" accept="image/*" capture="environment" class="form-control mb-3" required>
            
            <div id="statusText" class="small text-danger mb-3">Checking status...</div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary w-100 py-3 fw-bold" id="btnIn" onclick="markAttendance('In')">☀️ Clock IN</button>
                <button class="btn btn-dark w-100 py-3 fw-bold" id="btnOut" onclick="markAttendance('Out')">🌙 Clock OUT</button>
            </div>
        </div>

        <h6 class="fw-bold text-muted border-bottom pb-2">My History (Last 30 Days)</h6>
        <div id="history-list"></div>
    </div>

<script>
        // 1. Added the live cloud server link
        const SERVER_URL = "https://msgcppl-backend.onrender.com";

        const token = localStorage.getItem('token');
        
        async function loadHistory() {
            // Updated fetch to use SERVER_URL
            const res = await fetch(`${SERVER_URL}/api/attendance/my-history`, { headers: {'Authorization': `Bearer ${token}`} });
            const data = await res.json();
            const list = document.getElementById('history-list');
            list.innerHTML = data.map(r => `
                <div class="card mb-2 p-3 border-0 shadow-sm">
                    <div class="d-flex justify-content-between border-bottom pb-1 mb-2">
                        <strong>${r.dateString}</strong>
                    </div>
                    <div class="d-flex justify-content-between small">
                        <span>IN: ${r.clockInTime ? new Date(r.clockInTime).toLocaleTimeString() : '--'} (<span class="text-${r.clockInStatus==='Approved'?'success':'warning'}">${r.clockInStatus}</span>)</span>
                        <span>OUT: ${r.clockOutTime ? new Date(r.clockOutTime).toLocaleTimeString() : '--'} (<span class="text-${r.clockOutStatus==='Approved'?'success':'warning'}">${r.clockOutStatus || 'N/A'}</span>)</span>
                    </div>
                </div>
            `).join('');

            // Logic to disable buttons based on today's status
            const today = new Date().toISOString().split('T')[0];
            const todayRecord = data.find(d => d.dateString === today);
            
            document.getElementById('btnIn').disabled = false;
            document.getElementById('btnOut').disabled = false;
            document.getElementById('statusText').innerText = "Ready to capture.";

            if (todayRecord) {
                document.getElementById('btnIn').disabled = true;
                if (todayRecord.clockOutTime) {
                    document.getElementById('btnOut').disabled = true;
                    document.getElementById('statusText').innerText = "Shift completed for today.";
                } else {
                    document.getElementById('statusText').innerText = "Clocked In. Ready for Clock Out.";
                }
            }
        }

        async function markAttendance(type) {
            const file = document.getElementById('camInput').files[0];
            if (!file) return alert("Please take a photo first!");

            document.getElementById('statusText').innerText = "Locating GPS and uploading...";

            // Get GPS Location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const coords = `${position.coords.latitude},${position.coords.longitude}`;
                    
                    // Upload Photo - Updated fetch to use SERVER_URL
                    const fd = new FormData(); fd.append('photo', file);
                    const upRes = await fetch(`${SERVER_URL}/api/upload-photo`, { method: 'POST', headers: {'Authorization': `Bearer ${token}`}, body: fd });
                    const photoUrl = (await upRes.json()).url;

                    // Send to Database - Updated fetch to use SERVER_URL
                    const res = await fetch(`${SERVER_URL}/api/attendance/mark`, {
                        method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                        body: JSON.stringify({ photoUrl, coords, type })
                    });
                    
                    if(res.ok) { alert(`Successfully Clocked ${type}!`); document.getElementById('camInput').value = ''; loadHistory(); }
                    else alert((await res.json()).error);
                    
                }, (error) => {
                    alert("GPS Access Denied! Please allow location permissions to mark attendance.");
                    document.getElementById('statusText').innerText = "Location Error.";
                }, { enableHighAccuracy: true });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        window.onload = loadHistory;
    </script>
</body>
</html>

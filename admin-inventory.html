<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Inventory Admin | MSGCPPL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .table-responsive { background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="management-dashboard.html">⬅ Back to Dashboard</a>
            <span class="navbar-text text-white fw-bold">Master Inventory Control</span>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-0 border-top border-primary border-4 mb-4">
                    <h5 class="fw-bold mb-3">Define Site Material</h5>
                    <select id="invProj" class="form-select mb-3 bg-light" onchange="loadData()">
                        <option value="" disabled selected>Select Site...</option>
                    </select>
                    
                    <label class="small fw-bold text-muted mb-1">Material Name & Unit</label>
                    <div class="input-group mb-3">
                        <input type="text" id="itemName" class="form-control bg-light" placeholder="Ex: Cement">
                        <input type="text" id="itemUnit" class="form-control bg-light" placeholder="Unit (Bags)">
                    </div>

                    <label class="small fw-bold text-muted mb-1">Total Required (Freezed)</label>
                    <input type="number" id="itemReq" class="form-control mb-3 bg-light" placeholder="Ex: 5000">

                    <label class="small fw-bold text-muted mb-1">Total Sent by Admin (Freezed)</label>
                    <input type="number" id="itemSent" class="form-control mb-4 bg-light" placeholder="Ex: 1000">
                    
                    <button class="btn btn-primary w-100 fw-bold shadow-sm" onclick="saveAdminItem()">💾 Save to Site</button>
                </div>
            </div>
            
            <div class="col-md-8">
                <h5 class="fw-bold text-dark mb-2">1. Live Balances</h5>
                <div class="table-responsive mb-4">
                    <table class="table table-bordered table-sm mb-0 text-center">
                        <thead class="table-dark"><tr><th>Material</th><th>Req</th><th>Sent</th><th class="bg-success">Live Balance</th></tr></thead>
                        <tbody id="overview-table"></tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                    <h5 class="fw-bold mb-0 text-dark">2. Detailed Ledger (Storekeeper Logs)</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-sm mb-0">
                        <thead class="table-secondary">
                            <tr><th>Date</th><th>User</th><th>Action</th><th>Item</th><th>Qty</th><th>Details / Reason</th></tr>
                        </thead>
                        <tbody id="log-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
        const SERVER_URL = "https://msgcppl-backend.onrender.com";
        const token = localStorage.getItem('token');
        
        if (localStorage.getItem('role') !== 'admin') window.location.href = 'login.html';
        
        async function init() {
            const pRes = await fetch(`${SERVER_URL}/api/projects`, { headers: {'Authorization': `Bearer ${token}`} });
            const projs = await pRes.json();
            document.getElementById('invProj').innerHTML += projs.map(p => `<option value="${p._id}">${p.name}</option>`).join('');
        }
        
        async function saveAdminItem() {
            const pId = document.getElementById('invProj').value;
            if(!pId) return alert("Select a site first.");
            
            await fetch(`${SERVER_URL}/api/inventory/admin/item`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({ 
                    projectId: pId, 
                    itemName: document.getElementById('itemName').value, 
                    unit: document.getElementById('itemUnit').value,
                    totalRequired: document.getElementById('itemReq').value,
                    totalSent: document.getElementById('itemSent').value
                })
            });
            alert("Saved!");
            loadData();
        }

        async function loadData() {
            const pId = document.getElementById('invProj').value;
            if(!pId) return;

            // Load Overview
            const iRes = await fetch(`${SERVER_URL}/api/inventory/items/${pId}`, { headers: {'Authorization': `Bearer ${token}`} });
            const items = await iRes.json();
            document.getElementById('overview-table').innerHTML = items.map(i => `
                <tr><td class="fw-bold text-primary">${i.itemName}</td><td>${i.totalRequired}</td><td>${i.totalSent}</td><td class="fw-bold fs-5 text-success">${i.currentBalance}</td></tr>
            `).join('');

            // Load Detailed Ledger
            const logRes = await fetch(`${SERVER_URL}/api/inventory/logs/${pId}`, { headers: {'Authorization': `Bearer ${token}`} });
            const logs = await logRes.json();
            document.getElementById('log-table').innerHTML = logs.map(l => {
                let details = '';
                if(l.actionType === 'Consumed') details = `<b>To:</b> ${l.issuedTo} | <b>Purp:</b> ${l.purpose}`;
                if(l.actionType === 'Returned') details = `<b>By:</b> ${l.returnedBy} | <b>Cause:</b> ${l.causeOfReturn} (${l.returnStatus})`;
                if(l.actionType === 'Received') details = 'N/A';

                return `
                <tr>
                    <td class="small text-muted">${new Date(l.date).toLocaleDateString()}</td>
                    <td class="fw-bold text-danger">@${l.storekeeperName}</td>
                    <td><span class="badge ${l.actionType==='Received'?'bg-success':l.actionType==='Consumed'?'bg-danger':'bg-info text-dark'}">${l.actionType}</span></td>
                    <td class="fw-bold">${l.itemName}</td>
                    <td>${l.quantity}</td>
                    <td class="small">${details}</td>
                </tr>`;
            }).join('');
        }

        window.onload = init;
    </script>
</body>
</html>

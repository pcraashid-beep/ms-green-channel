<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Material Inventory | MSGCPPL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4"><div class="container"><a class="navbar-brand fw-bold" href="management-dashboard.html">⬅ Dashboard</a></div></nav>
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-0 mb-4">
                    <h6 class="fw-bold">Update Stock</h6>
                    <select id="invProj" class="form-select mb-2" onchange="refreshList()"></select>
                    <input type="text" id="invItem" class="form-control mb-2" placeholder="Item (e.g. Cement)">
                    <div class="input-group mb-2">
                        <input type="number" id="invQty" class="form-control" placeholder="Qty">
                        <input type="text" id="invUnit" class="form-control" placeholder="Unit (Bags/Kg)">
                    </div>
                    <button class="btn btn-primary w-100 fw-bold" onclick="updateInv()">Add to Stock</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-3 shadow-sm border-0">
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                        <h6 class="fw-bold mb-0">Current Inventory Levels</h6>
                        <button class="btn btn-sm btn-outline-dark" onclick="loadAllStock()">View All Sites Stock</button>
                    </div>
                    <div id="inv-list"></div>
                </div>
            </div>
        </div>
    </div>
<script>
        // 1. Added the live cloud server link
        const SERVER_URL = "https://msgcppl-backend.onrender.com";

        const token = localStorage.getItem('token');
        
        async function load() {
            // Updated fetch to use SERVER_URL
            const pRes = await fetch(`${SERVER_URL}/api/projects`, { headers: {'Authorization': `Bearer ${token}`} });
            const projects = await pRes.json();
            const sel = document.getElementById('invProj');
            sel.innerHTML = projects.map(p => `<option value="${p._id}">${p.name}</option>`).join('');
            refreshList();
        }
        
        async function updateInv() {
            // Updated fetch to use SERVER_URL
            await fetch(`${SERVER_URL}/api/inventory`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({ projectId: invProj.value, itemName: invItem.value, quantity: invQty.value, unit: invUnit.value })
            });
            invItem.value = invQty.value = ''; refreshList();
        }

        async function refreshList() {
            // Updated fetch to use SERVER_URL
            const res = await fetch(`${SERVER_URL}/api/inventory/${invProj.value}`, { headers: {'Authorization': `Bearer ${token}`} });
            renderInv(await res.json(), false);
        }

        async function loadAllStock() {
            // Updated fetch to use SERVER_URL
            const res = await fetch(`${SERVER_URL}/api/inventory/all`, { headers: {'Authorization': `Bearer ${token}`} });
            renderInv(await res.json(), true);
        }

        function renderInv(items, showSite) {
            document.getElementById('inv-list').innerHTML = items.length ? items.map(i => `
                <div class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <div>
                        ${showSite ? `<span class="badge bg-secondary mb-1">${i.projectName}</span><br>` : ''}
                        <strong>${i.itemName}</strong>
                    </div>
                    <div class="text-end">
                        <span class="fw-bold d-block mb-1">${i.quantity} ${i.unit}</span>
                        <button class="btn btn-sm btn-warning py-0 px-2" onclick="consumeStock('${i._id}')">Consume</button>
                        <button class="btn btn-sm btn-danger py-0 px-2 ms-1" onclick="deleteStock('${i._id}')">🗑</button>
                    </div>
                </div>`).join('') : '<p class="text-muted small">No stock available.</p>';
        }

        async function consumeStock(id) {
            const amt = prompt("Enter quantity to consume from site:");
            if (amt && !isNaN(amt)) {
                // Updated fetch to use SERVER_URL
                const res = await fetch(`${SERVER_URL}/api/inventory/consume/${id}`, {
                    method: 'PUT', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                    body: JSON.stringify({ consumeAmount: amt })
                });
                if(res.ok) refreshList(); else alert("Error: Insufficient stock.");
            }
        }

        async function deleteStock(id) {
            if(confirm("Delete this inventory item entirely?")) {
                // Updated fetch to use SERVER_URL
                await fetch(`${SERVER_URL}/api/inventory/${id}`, { method: 'DELETE', headers: {'Authorization': `Bearer ${token}`} });
                refreshList();
            }
        }

        window.onload = load;
    </script>
</body>
</html>

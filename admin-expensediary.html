<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Diary Review | MSGCPPL Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .card { border-radius: 12px; }
        .border-pending { border-top: 4px solid #ffc107 !important; }
        .border-approved { border-top: 4px solid #198754 !important; }
        .border-rejected { border-top: 4px solid #dc3545 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4 shadow-sm" style="background-color: #8e44ad;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="admin-staff.html">⬅ Back to HR Hub</a>
            <span class="navbar-text text-white fw-bold d-none d-md-block">Expense Diary Control</span>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
            <h4 class="fw-bold mb-0 text-dark">Staff Expense Logs</h4>
            <button class="btn btn-sm btn-outline-secondary" onclick="loadExpenses()">🔄 Refresh</button>
        </div>

        <div class="row g-4" id="expense-list">
            <div class="text-center text-muted py-5 w-100">Loading expense diaries...</div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://msgcppl-backend.onrender.com";
        const token = localStorage.getItem('token');
        
        if (localStorage.getItem('role') !== 'admin') window.location.href = 'login.html';

        async function loadExpenses() {
            try {
                const res = await fetch(`${SERVER_URL}/api/expensediary/admin`, { 
                    headers: {'Authorization': `Bearer ${token}`} 
                });
                const data = await res.json();
                const list = document.getElementById('expense-list');
                
                if(data.length === 0) {
                    list.innerHTML = '<div class="col-12 text-center text-muted py-4">No expenses submitted yet.</div>';
                    return;
                }

                list.innerHTML = data.map(ex => {
                    let borderClass = 'border-pending';
                    let badge = '<span class="badge bg-warning text-dark">Pending Review</span>';
                    let actionBtns = `
                        <div class="d-flex gap-2 mt-3">
                            <button class="btn btn-success flex-fill fw-bold py-2" onclick="updateStatus('${ex._id}', 'Approved')">Approve</button>
                            <button class="btn btn-danger flex-fill fw-bold py-2" onclick="updateStatus('${ex._id}', 'Rejected')">Reject</button>
                        </div>`;

                    if (ex.status === 'Approved') {
                        borderClass = 'border-approved';
                        badge = '<span class="badge bg-success">Approved</span>';
                        actionBtns = `<div class="mt-3 text-center p-2 bg-light rounded text-success fw-bold">✔ Expense Cleared</div>`;
                    } else if (ex.status === 'Rejected') {
                        borderClass = 'border-rejected';
                        badge = '<span class="badge bg-danger">Rejected</span>';
                        actionBtns = `<div class="mt-3 text-center p-2 bg-light rounded text-danger fw-bold">✖ Expense Denied</div>`;
                    }

                    const billBtn = ex.billUrl ? `<a href="${SERVER_URL}${ex.billUrl}" target="_blank" class="btn btn-sm btn-outline-primary mt-2 w-100">📎 View Attached Bill</a>` : '<div class="text-muted small mt-2 text-center">No Bill Provided</div>';

                    return `
                        <div class="col-md-6 col-lg-4">
                            <div class="card shadow-sm border-0 h-100 ${borderClass}">
                                <div class="card-body d-flex flex-column p-4">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <div>
                                            <h6 class="fw-bold text-primary mb-0">@${ex.staffName}</h6>
                                            <small class="text-muted fw-bold">${ex.dateString}</small>
                                        </div>
                                        ${badge}
                                    </div>
                                    
                                    <h4 class="text-dark fw-bold mb-2">₹${ex.amount.toLocaleString()}</h4>
                                    <p class="text-muted small flex-grow-1 mb-0">${ex.purpose}</p>
                                    
                                    ${billBtn}
                                    ${actionBtns}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(e) {
                document.getElementById('expense-list').innerHTML = '<div class="col-12 text-danger text-center">Failed to load data.</div>';
            }
        }

        async function updateStatus(id, status) {
            if(!confirm(`Mark this expense as ${status}?`)) return;
            try {
                await fetch(`${SERVER_URL}/api/expensediary/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ status })
                });
                loadExpenses(); 
            } catch(e) {
                alert("Error updating status.");
            }
        }

        window.onload = loadExpenses;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigned Tasks | MS Green Channel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --msg-green: #2e7d32; }
        .sidebar { min-height: 100vh; background: var(--msg-green); color: white; padding: 20px; }
        .nav-link { color: white; opacity: 0.8; margin-bottom: 10px; transition: 0.2s; }
        .nav-link:hover { opacity: 1; padding-left: 5px; }
        .task-card { transition: 0.2s; }
        .task-card:hover { background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar shadow">
                <div class="text-center mb-4 border-bottom border-success pb-3">
                    <img src="logo.png" alt="MSGCPPL" style="max-width: 70px; margin-bottom: 10px;">
                    <h5 class="text-white fw-bold mb-0">MSGCPPL</h5>
                </div>
                <div class="nav flex-column">
                    <a class="nav-link" href="employee-portal.html">🏠 Home Hub</a>
                    <a class="nav-link fw-bold" style="opacity: 1;" href="staff-tasks.html">📋 Assigned Tasks</a>
                    <a class="nav-link" href="staff-attendance.html">📅 Attendance</a>
                    <a class="nav-link" href="staff-approval.html">✅ Special Approval</a>
                    <a class="nav-link" href="tourdiary.html">✈️ Tour Diary</a>
                    <a class="nav-link" href="staff-expense.html">💰 Expense Diary</a>
                    <a class="nav-link text-warning mt-5 fw-bold" href="#" onclick="localStorage.clear(); window.location.href='login.html'">🚪 Logout</a>
                </div>
            </nav>
            
            <main class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                    <h3 class="fw-bold mb-0 text-primary">Assigned Tasks</h3>
                    <span class="badge bg-success p-2 fs-6 shadow-sm">User: <span id="user-display">...</span></span>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white fw-bold p-3">
                        My Pending & Completed Work
                    </div>
                    <div class="card-body p-0" id="staff-task-list">
                        <div class="text-center p-4 text-muted">Loading tasks...</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

<script>
        const SERVER_URL = "https://msgcppl-backend.onrender.com";

        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const fullName = localStorage.getItem('fullName');

        if (!token) window.location.href = "login.html";
        document.getElementById('user-display').innerText = fullName;

        async function loadTasks() {
            try {
                const res = await fetch(`${SERVER_URL}/api/worklogs?staffName=${username}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const logs = await res.json();
                const container = document.getElementById('staff-task-list');
                
                if(logs.length === 0) {
                    container.innerHTML = '<p class="text-muted text-center p-4 mb-0">No tasks assigned at the moment.</p>';
                    return;
                }

                container.innerHTML = '';
                logs.forEach(log => {
                    const div = document.createElement('div');
                    div.className = "border-bottom p-3 d-flex justify-content-between align-items-center task-card";
                    div.innerHTML = `
                        <div>
                            <span class="badge bg-secondary mb-2">${log.projectName || 'General Site'}</span>
                            <h6 class="mb-1 fw-bold">${log.task}</h6>
                            <small class="text-muted">Assigned: ${new Date(log.date).toLocaleDateString()}</small>
                        </div>
                        <div>
                            ${log.status === 'Pending' 
                                ? `<button class="btn btn-sm btn-success px-4 fw-bold shadow-sm" onclick="markDone('${log._id}', this)">Mark Complete</button>` 
                                : `<span class="badge bg-white text-success border border-success p-2">✔ Completed</span>`}
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch(e) {
                document.getElementById('staff-task-list').innerHTML = "<p class='p-4 text-danger'>Failed to load tasks. Please check your connection.</p>";
            }
        }

        async function markDone(id, btn) {
            btn.disabled = true;
            btn.innerText = "Updating...";
            await fetch(`${SERVER_URL}/api/worklogs/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ status: "Completed" })
            });
            loadTasks();
        }
        
        window.onload = loadTasks;
    </script>
</body>
</html>
